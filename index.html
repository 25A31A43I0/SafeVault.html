<!DOCTYPE html>
<html>

<head>
    <title>SafeVault AI 🔐</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .container {
            margin-top: 40px;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #dashboard {
            display: none;
        }

        #status {
            font-weight: bold;
            color: red;
        }

        #aiResult {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>SafeVault AI 🔐</h1>

    <!-- AUTH -->
    <div id="authBox" class="container">
        <h3>Login / Register</h3>

        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>

        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="container">
        <h3>Dashboard</h3>

        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Save File</button>

        <h4>Your Files:</h4>
        <ul id="fileList"></ul>

        <br>

        <button onclick="simulateRisk()">⚠️ Simulate Risk</button>
        <button onclick="emergencyLock()">🚨 Emergency Lock</button>

        <p id="status"></p>
        <p id="aiResult"></p>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>

        // ---------------- DOM ----------------
        const authBox = document.getElementById("authBox");
        const dashboard = document.getElementById("dashboard");
        const fileInput = document.getElementById("fileInput");
        const fileList = document.getElementById("fileList");
        const status = document.getElementById("status");

        // ---------------- FIREBASE CONFIG ----------------
        const firebaseConfig = {
            apiKey: "AIzaSyDMNcZl92ji_R2Wry4Rty-Telh-8MIjvAg",
            authDomain: "neurovault-cb7cf.firebaseapp.com",
            databaseURL: "https://neurovault-cb7cf-default-rtdb.firebaseio.com",
            projectId: "neurovault-cb7cf",
            storageBucket: "neurovault-cb7cf.firebasestorage.app",
            messagingSenderId: "844677752771",
            appId: "1:844677752771:web:3b4e18a73a7a2636063f76",
            measurementId: "G-NK0MVP5BDY"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();

        // ---------------- AUTH ----------------
        function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert("Registered Successfully"))
                .catch(err => alert(err.message));
        }

        function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => alert(err.message));
        }

        // ---------------- DASHBOARD ----------------
        function showDashboard() {
            authBox.style.display = "none";
            dashboard.style.display = "block";
            listFiles();
        }

        function uploadFile() {
            const file = fileInput.files[0];
            const user = auth.currentUser;

            if (!file) return alert("Select a file");
            if (!user) return alert("Login required");

            db.ref("files/").push({
                name: file.name,
                user: user.email,
                time: new Date().toString()
            });

            alert("File saved!");
        }

        function listFiles() {
            const user = auth.currentUser;
            if (!user) return;

            db.ref("files/").on("value", snapshot => {
                fileList.innerHTML = "";

                snapshot.forEach(child => {
                    const data = child.val();

                    if (data.user === user.email) {
                        const li = document.createElement("li");
                        li.textContent = data.name;
                        fileList.appendChild(li);
                    }
                });
            });
        }

        function simulateRisk() {
            status.innerText = "⚠️ Unsafe environment detected!";
        }

        function emergencyLock() {
            auth.signOut().then(() => location.reload());
        }

        // ---------------- AUTH STATE ----------------
        auth.onAuthStateChanged(user => {
            if (user) showDashboard();
            else {
                authBox.style.display = "block";
                dashboard.style.display = "none";
            }
        });

    </script>

</body>

</html>
