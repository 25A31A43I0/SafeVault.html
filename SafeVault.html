<!DOCTYPE html>
<html>

<head>
    <title>SafeVault AI 🔐</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .container {
            margin-top: 40px;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #dashboard {
            display: none;
        }

        #status {
            font-weight: bold;
            color: red;
        }
    </style>
</head>

<body>

    <h1>SafeVault AI 🔐</h1>

    <!-- LOGIN -->
    <div id="authBox" class="container">
        <h3>Login / Register</h3>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>

        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="container">
        <h3>Dashboard</h3>

        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Save File</button>

        <h4>Your Files:</h4>
        <ul id="fileList"></ul>

        <br>
        <button onclick="simulateRisk()">⚠️ Simulate Risk</button>
        <button onclick="emergencyLock()">🚨 Emergency Lock</button>

        <p id="status"></p>
    </div>

    <!-- Firebase Auth ONLY -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // 🔥 Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDMNcZl92ji_R2Wry4Rty-Telh-8MIjvAg",
            authDomain: "neurovault-cb7cf.firebaseapp.com",
            projectId: "neurovault-cb7cf",
            appId: "1:844677752771:web:3b4e18a73a7a2636063f76"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 🔐 Register
        function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert("Registered Successfully"))
                .catch(err => alert(err.message));
        }

        // 🔑 Login
        function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => showDashboard())
                .catch(err => alert(err.message));
        }

        // Show Dashboard
        function showDashboard() {
            document.getElementById("authBox").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            listFiles();
        }

        // 📂 Upload File (LOCAL STORAGE)
        function uploadFile() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return alert("Select a file");

            let files = JSON.parse(localStorage.getItem("files")) || [];
            files.push(file.name);

            localStorage.setItem("files", JSON.stringify(files));

            alert("File Saved Locally!");
            listFiles();
        }

        // 📋 List Files
        function listFiles() {
            const list = document.getElementById("fileList");
            list.innerHTML = "";

            let files = JSON.parse(localStorage.getItem("files")) || [];

            files.forEach(file => {
                const li = document.createElement("li");
                li.textContent = file;
                list.appendChild(li);
            });
        }

        // ⚠️ Risk Simulation
        function simulateRisk() {
            document.getElementById("status").innerText =
                "⚠️ Unsafe environment detected!";
        }

        // 🚨 Emergency Lock
        function emergencyLock() {
            auth.signOut().then(() => {
                alert("System Locked!");
                location.reload();
            });
        }

        // Auto login session
        auth.onAuthStateChanged(user => {
            if (user) showDashboard();
        });
    </script>

</body>

</html>
